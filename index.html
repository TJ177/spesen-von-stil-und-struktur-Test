<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spesen von Stil & Struktur</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1a2b">

<!-- Icons -->
<link rel="icon" href="logo.png">
<link rel="apple-touch-icon" href="icon-192.png">

<!-- Style -->
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0b1a2b;
    color:white;
}

.header{
    padding:20px;
    background:#10243d;
    display:flex;
    align-items:center;
    gap:15px;
}

.header img{
    width:50px;
    height:50px;
    border-radius:50%;
}

.container{
    padding:20px;
}

.card{
    background:#132b4a;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#2f7df6;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#1f5ed1;
}

.install-btn{
    background:#28a745;
    margin-top:10px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <div>
        <h2>Spesen von Stil & Struktur</h2>
        <small>Kompakte Fahrer-App</small>
    </div>
</div>

<div class="container">

    <div class="card">
        <h3>App Installation</h3>
        <p>Installiere die App direkt auf deinem Handy:</p>

        <b>Android:</b><br>
        1. Link öffnen<br>
        2. oben rechts auf die 3 Punkte tippen<br>
        3. Installieren<br><br>

        Danach in der App registrieren, Testzeit genießen und App erkunden und danach ein Paket buchen.
        
        <br><br>

        <button class="install-btn" onclick="copyAppLink()">App-Link kopieren</button>
    </div>

</div>

<script>
function copyAppLink() {
    const text = "Hier ist mein App-Link für Spesen von Stil & Struktur:\n\n" +
    "https://tj177.github.io/spesen-von-stil-und-struktur-Test/\n\n" +
    "Android:\n" +
    "1. Link öffnen\n" +
    "2. oben rechts auf die 3 Punkte tippen\n" +
    "3. Installieren\n\n" +
    "Danach in der App registrieren, Testzeit genießen und App erkunden und danach ein Paket buchen.";

    navigator.clipboard.writeText(text);
    alert("Link + Anleitung kopiert!");
}
</script>

</body>
</html>
