<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spesen von Stil und Struktur</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
.wrap{max-width:1200px;margin:auto;padding:20px}
.card{background:#1e293b;border-radius:16px;padding:20px;margin-bottom:20px}
input,button,select{padding:10px;border-radius:10px;border:none;margin:5px 0;width:100%}
button{cursor:pointer}
.green{background:#22c55e}
.red{background:#ef4444}
.gray{background:#e5e7eb;color:black}
.row{display:flex;gap:10px}
.row > *{flex:1}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>Spesen von Stil und Struktur</h1>
<div id="status">Nicht angemeldet</div>
</div>

<div class="card">
<h2>Login</h2>
<input id="email" placeholder="E-Mail">
<input id="pw" type="password" placeholder="Passwort">

<div class="row">
<button class="green" onclick="login()">Anmelden</button>
<button onclick="register()">Registrieren</button>
<button class="red" onclick="logout()">Abmelden</button>
</div>
</div>

<div class="card">
<h2>Fahrt</h2>
<input id="tour" placeholder="Tour">
<input id="start" type="datetime-local">
<input id="end" type="datetime-local">

<div class="row">
<button class="green" onclick="now('start')">Start jetzt</button>
<button class="red" onclick="now('end')">Ende jetzt</button>
</div>

<button onclick="save()">Speichern</button>
</div>

<div class="card">
<h2>Fahrten</h2>
<div id="list"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsqrNPEtKCaDe5vywUIoM9fK-vXqV_sr4",
  authDomain: "spesen-test-31a53.firebaseapp.com",
  projectId: "spesen-test-31a53",
  storageBucket: "spesen-test-31a53.appspot.com",
  messagingSenderId: "722110907370",
  appId: "1:722110907370:web:6d1253fb66f02fe4b76893"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user = null;

onAuthStateChanged(auth, u => {
  user = u;
  document.getElementById("status").innerText = u ? "Angemeldet: " + u.email : "Nicht angemeldet";
  if(u) load();
});

window.login = async () => {
  await signInWithEmailAndPassword(auth, email.value, pw.value);
};

window.register = async () => {
  await createUserWithEmailAndPassword(auth, email.value, pw.value);
};

window.logout = async () => {
  await signOut(auth);
};

window.now = (id) => {
  document.getElementById(id).value = new Date().toISOString().slice(0,16);
};

window.save = async () => {
  if(!user) return alert("Login fehlt");

  const start = new Date(startTime(start.value));
  const end = new Date(startTime(end.value));

  const hours = (end - start) / 1000 / 60 / 60;
  let money = 0;

  if(hours >= 8 && hours < 24) money = 14;
  if(hours >= 24){
    let days = Math.floor(hours / 24);
    money = days * 28;
    if(hours % 24 >= 8) money += 14;
  }

  await addDoc(collection(db, "users", user.uid, "trips"), {
    tour: tour.value,
    start: start.value,
    end: end.value,
    hours,
    money
  });
};

function startTime(v){ return v }

function load(){
  onSnapshot(collection(db, "users", user.uid, "trips"), snap => {
    list.innerHTML = "";
    snap.forEach(d => {
      let t = d.data();
      list.innerHTML += `<div>${t.tour} | ${t.money}€</div>`;
    });
  });
}

</script>
</body>
</html>
